<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova OS | Alternate Web OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="p_rc(event)">
    <div id="p_ls" class="l-scr">
        <div class="l-box">
            <h1 id="p_lt">Innova OS</h1>
            <div id="p_af">
                <input type="text" id="p_em" placeholder="Username">
                <input type="password" id="p_pw" placeholder="Password (admin)">
                <button onclick="p_lg()">Sign In</button>
                <p onclick="p_sm()" id="p_tm">New Account</p>
            </div>
        </div>
    </div>

    <div id="p_ds" class="p-surf">
        <div class="i-grid">
            <div class="unit" onclick="p_app('notepad', '📝')">
                <div class="u-img g-blue">📝</div><span>Notepad</span>
            </div>
            <div class="unit" onclick="p_app('calc', '🧮')">
                <div class="u-img g-grey">🧮</div><span>Calc</span>
            </div>
            <div class="unit" onclick="p_app('camera', '📷')">
                <div class="u-img g-red">📷</div><span>Camera</span>
            </div>
            <div class="unit" onclick="p_app('browser', '🌐')">
                <div class="u-img g-purp">🌐</div><span>Browser</span>
            </div>
            <div class="unit" onclick="p_app('files', '📁')">
                <div class="u-img g-gold">📁</div><span>Files</span>
            </div>
            <div class="unit" onclick="p_app('ai', '🤖')">
                <div class="u-img g-rbow">🤖</div><span>Innova AI</span>
            </div>
            <div class="unit" onclick="p_app('terminal', '💻')">
                <div class="u-img g-dark">💻</div><span>Terminal</span>
            </div>
        </div>
        <div id="p_wl"></div>
    </div>

    <div id="p_sf" class="m-11">
        <div class="p-s">
            <input type="text" placeholder="Search applications..." onkeyup="p_sr(this.value)">
        </div>
        <div class="p-a">
            <div onclick="p_app('notepad', '📝'); p_ts()">📝<br>Notes</div>
            <div onclick="p_app('calc', '🧮'); p_ts()">🧮<br>Calc</div>
            <div onclick="p_app('browser', '🌐'); p_ts()">🌐<br>Web</div>
            <div onclick="p_app('files', '📁'); p_ts()">📁<br>Files</div>
            <div onclick="p_app('terminal', '💻'); p_ts()">💻<br>CMD</div>
            <div onclick="window.location.reload()">🔄<br>Reset</div>
        </div>
        <div class="p-f">👤 Innova Admin</div>
    </div>

    <div class="t-11">
        <div class="t-c">
            <div class="s-i" onclick="p_ts()">🪐</div>
            <div id="p_tb" class="a-l"></div>
        </div>
        <div class="t-d" id="p_clk">00:00</div>
    </div>

    <div id="p_cm" class="c-m">
        <div onclick="window.location.reload()">Refresh OS</div>
        <div onclick="alert('Innova OS v5.0 Final')">Build Info</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
